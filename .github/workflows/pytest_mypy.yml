name: CI_pytest_mypy_datawarrior_clustersort

# name    : pytest_mypy.yml
# purpose : regularly run pytest on datawarrior_clustersort
# date    : [2025-03-19 Wed]
# edit      [2026-06-16 Tue]

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:     # provide a manual trigger
  schedule:
    - cron: "0 0 1 * *"  # once each 1st of a month, at 00:00 UTC (cf. https://crontab.guru/)

# prevent concurrency of workflows (rule GH102):
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        # for a factorial test, an explicit selection of GitHub runner images
        # https://github.com/actions/runner-images?tab=readme-ov-file#available-images
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.x"]
    runs-on: ${{ matrix.os }}

    timeout-minutes: 3  # individual timeout for each job

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: setup pytest, mypy
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest
          pip install mypy

      - name: Run the check with pytest
        run: |
          pytest
          pytest -v

      - name: check with mypy
        run: |
          mypy src/app/datawarrior_clustersort.py
